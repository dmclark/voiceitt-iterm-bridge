<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Voiceitt Scratchpad</title>
  <style>
    /*
     * Typography: Atkinson Hyperlegible (Braille Institute, OFL).
     * Loaded from Google Fonts via @import for simplicity. Tradeoff: needs
     * network on first page load; the file is then cached by Chrome. If
     * we ever want fully-offline behaviour, vendor `atkinson-hyperlegible.woff2`
     * into bridge/ and swap this @import for an @font-face rule.
     * See ROADMAP §0.5.3 / ERD 0.5.3.
     */
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');

    html, body {
      margin: 0; padding: 0; height: 100%;
      /* Warmer scratchpad background — reads as "working surface", not "blank document". */
      background: #fafaf7; color: #1a1a1a;
      font-family: "Atkinson Hyperlegible", -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }
    body { display: flex; flex-direction: column; }
    header { padding: 8px 14px; font-size: 12px; color: #666; border-bottom: 1px solid #e6e6e1; display: flex; justify-content: space-between; align-items: center; background: #f5f4ef; }
    /*
     * Two-pane layout (ROADMAP §0.5.1).
     * Top = "Dictated" (live, what Voiceitt writes into).
     * Bottom = "To be pasted" (read-only mirror today; §1 replaces this
     *   with the LLM-transformed text, at which point it becomes editable).
     * Each pane is a flex column: label strip + textarea. The two panes
     * split the body 50/50 via flex:1.
     */
    .pane { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 8px 10px; box-sizing: border-box; }
    .pane + .pane { border-top: 1px solid #e6e6e1; }
    .pane-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; padding: 2px 6px 6px; }
    textarea {
      flex: 1; width: 100%; box-sizing: border-box;
      padding: 14px 16px; border: 0; outline: none; resize: none;
      background: #fafaf7; color: #1a1a1a;
      font-family: "Atkinson Hyperlegible", -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 22px; line-height: 1.5;
      border-radius: 8px;
      /*
       * Caret visibility (ROADMAP §0.5 / ERD 0.5.4).
       * - High-contrast caret (macOS system red) is the single biggest win
       *   for "where did I leave off?" on a warm-white scratchpad.
       * - Focused pane bumps font-size 22 → 26 px (caret height tracks
       *   line-height, so a chunkier caret falls out for free) with a
       *   short transition so it doesn't feel jarring.
       * - Focused pane also picks up a faint warm tint via inset
       *   box-shadow, which doubles as "which pane has the caret?" once
       *   the two-pane layout (0.5.1) lands.
       */
      caret-color: #ff3b30;
      transition: font-size 80ms ease;
    }
    textarea:focus {
      font-size: 26px;
      box-shadow: inset 0 0 0 9999px rgba(255, 235, 150, 0.18);
      /* Hide the native 1-px caret on the focused pane; the 3-px faux
         caret below replaces it. Unfocused panes keep `caret-color:
         #ff3b30` so a brief click-out still shows where you were. */
      caret-color: transparent;
    }
    /*
     * Faux caret (ROADMAP §0.5.4 step 5).
     * The native caret is hard-coded to 1 px in every browser; there is no
     * `caret-width` property. To get a chunkier "where am I?" bar we hide
     * the native caret on focus (above) and overlay a 3-px <div> whose
     * position is computed from a hidden mirror element that mirrors the
     * textarea's text + styles up to `selectionStart`. Same trick
     * CodeMirror / Monaco use.
     */
    #faux-caret {
      position: fixed;
      width: 3px;
      background: #ff3b30;
      pointer-events: none;
      display: none;
      z-index: 1000;
      border-radius: 1px;
      animation: faux-caret-blink 1.06s steps(1) infinite;
    }
    @keyframes faux-caret-blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
    button { background: #e6e6e1; color: #1a1a1a; border: 1px solid #cfcfc8; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-family: inherit; cursor: pointer; }
    button:hover { background: #d8d8d2; }
    /*
     * Tiny status indicator (ERD §1.3). Shows "idle" / "transforming…" /
     * "ok" / "fail-open: raw" so the auto-trigger is observable without
     * opening DevTools. Colours match the caret palette so it doesn't
     * shout when everything is fine.
     */
    #status { font-size: 11px; color: #888; min-width: 10ch; text-align: right; }
    #status.busy { color: #b07d00; }
    #status.ok   { color: #2e7d32; }
    #status.warn { color: #ff3b30; }
  </style>
</head>
<body>
  <header>
    <span>Voiceitt Scratchpad — dictate here, then trigger your Raycast hotkey.</span>
    <span id="status" aria-live="polite" title="LLM transform status">idle</span>
    <button id="clear" title="Clear (⌘K)">Clear</button>
  </header>
  <div class="pane">
    <div class="pane-label">Dictated</div>
    <textarea id="pad" autofocus placeholder="Start dictating with Voiceitt…"></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">To be pasted</div>
    <textarea id="pad-out"
      placeholder="LLM-cleaned text appears here after each dictated phrase. Edit before sending if needed; ⌘↵ in the top pane re-runs the transform."></textarea>
  </div>
  <div id="faux-caret" aria-hidden="true"></div>

  <script>
    const pad = document.getElementById('pad');
    const padOut = document.getElementById('pad-out');
    const clearBtn = document.getElementById('clear');
    const statusEl = document.getElementById('status');
    const fauxCaret = document.getElementById('faux-caret');

    // Default focus into the top (Dictated) pane so Voiceitt has somewhere
    // to write. We do NOT force focus back to it on every click anymore
    // (ERD §1.3 makes the bottom pane editable, so users need to be able
    // to click into it). Window-level focus still re-snaps to pad so a
    // freshly-restored Chrome window is dictation-ready.
    function refocus() { pad.focus(); }
    window.addEventListener('focus', refocus);
    setTimeout(refocus, 0);

    function clearAll() {
      pad.value = ''; padOut.value = '';
      lastInputSentToLLM = '';
      setStatus('idle');
      refocus(); updateFauxCaret();
    }
    clearBtn.addEventListener('click', clearAll);

    // Cmd+K to clear (works regardless of focused pane).
    window.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        clearAll();
      }
    });

    /*
     * ===========================================================
     *  §1.3 — auto-trigger + manual ⌘↵ trigger
     * ===========================================================
     *
     * Auto-trigger: ROADMAP §1 "Trigger mechanics" established that
     * Voiceitt commits each utterance via `execCommand('insertHTML')`,
     * which fires:
     *   1. a synthetic (`isTrusted: false`) `paste` ClipboardEvent
     *   2. a trusted `input` event with `inputType: ''`
     * Real keystrokes / user paste don't have step 1. So we latch
     * `voiceittWriting = true` on the untrusted paste and consume it on
     * the very next `input` event. Manual edits to the input field do
     * not fire the auto-trigger — that's intentional (the whole point
     * of editing by hand is usually to fix a mis-recognition the model
     * would otherwise paper over). To re-run after a manual edit, use
     * the manual trigger (⌘↵).
     *
     * Manual trigger: ⌘↵ while the input pane is focused. Force-fires
     * the transform even if `inputField.value === lastInputSentToLLM`
     * (otherwise re-runs after manual tweaks would be no-ops).
     *
     * `lastInputSentToLLM` lets a future "↻ Re-run" button (ERD §1.2)
     * gate its disabled state without further plumbing.
     */
    const TRANSFORM_DEBOUNCE_MS = 700;

    let voiceittWriting = false;
    let lastInputSentToLLM = '';
    let debounceTimer = null;
    let inFlight = null;

    function setStatus(label, kind) {
      statusEl.textContent = label;
      statusEl.className = kind || '';
    }

    pad.addEventListener('paste', (e) => {
      if (!e.isTrusted) voiceittWriting = true;
    }, true);

    pad.addEventListener('input', () => {
      if (!voiceittWriting) return;
      voiceittWriting = false;
      scheduleTransform();
    });

    function scheduleTransform() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runTransform, TRANSFORM_DEBOUNCE_MS);
    }

    async function runTransform() {
      const text = pad.value;
      if (!text) { setStatus('idle'); return; }
      if (text === lastInputSentToLLM) return;
      lastInputSentToLLM = text;

      // Cancel any in-flight call so the freshest dictation always wins.
      if (inFlight) inFlight.abort();
      inFlight = new AbortController();

      setStatus('transforming…', 'busy');
      try {
        const r = await fetch('/transform', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({text}),
          signal: inFlight.signal,
        });
        if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0, 200));
        const cleaned = await r.text();
        // Debug visibility — open DevTools (⌥⌘I) → Console to see each
        // round-trip. Cheap, removable, makes "is the LLM doing nothing
        // vs is it returning something different I can't tell apart"
        // distinguishable.
        console.log('[transform]', {input: text, output: cleaned, changed: cleaned !== text});
        padOut.value = cleaned;
        setStatus(cleaned === text ? 'ok (unchanged)' : 'ok', 'ok');
      } catch (err) {
        if (err.name === 'AbortError') return;
        // Fail-open: never block the user. Drop the raw text into the
        // output pane so the existing send-script flow still works,
        // and surface that we did so.
        console.warn('transform failed, falling back to raw text', err);
        padOut.value = text;
        setStatus('fail-open: raw', 'warn');
      } finally {
        inFlight = null;
        updateFauxCaret();
      }
    }

    // Manual trigger: ⌘↵ on the input field re-runs the transform,
    // bypassing the lastInputSentToLLM gate (so post-edit re-runs
    // actually go through).
    pad.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        clearTimeout(debounceTimer);
        lastInputSentToLLM = '';
        runTransform();
      }
    });

    /*
     * Faux-caret positioning (ROADMAP §0.5.4 step 5).
     *
     * Build a hidden <div> that mirrors the textarea's box + text up to
     * `selectionStart`, terminated by a zero-width <span>. The span's
     * client rect is the caret position; copy its top/left/height onto
     * the floating #faux-caret div.
     *
     * Relevant computed styles must match exactly or wrapping diverges
     * from the textarea and the caret lands on the wrong line.
     */
    const MIRROR_PROPS = [
      'direction', 'boxSizing',
      'borderTopWidth', 'borderRightWidth', 'borderBottomWidth', 'borderLeftWidth',
      'borderStyle',
      'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft',
      'fontStyle', 'fontVariant', 'fontWeight', 'fontStretch', 'fontSize',
      'fontSizeAdjust', 'lineHeight', 'fontFamily',
      'textAlign', 'textTransform', 'textIndent', 'textDecoration',
      'letterSpacing', 'wordSpacing', 'tabSize',
    ];

    let mirror = null;
    function getMirror() {
      if (mirror) return mirror;
      mirror = document.createElement('div');
      mirror.setAttribute('aria-hidden', 'true');
      Object.assign(mirror.style, {
        position: 'absolute',
        visibility: 'hidden',
        whiteSpace: 'pre-wrap',
        wordWrap: 'break-word',
        overflow: 'hidden',
        top: '0',
        left: '-9999px',
      });
      document.body.appendChild(mirror);
      return mirror;
    }

    function updateFauxCaret() {
      const ta = document.activeElement;
      if (!(ta instanceof HTMLTextAreaElement)) {
        fauxCaret.style.display = 'none';
        return;
      }
      const m = getMirror();
      const cs = getComputedStyle(ta);
      for (const p of MIRROR_PROPS) m.style[p] = cs[p];
      m.style.width = ta.clientWidth + 'px';

      const pos = ta.selectionStart;
      const before = ta.value.substring(0, pos);
      const after = ta.value.substring(pos) || '.';
      m.textContent = before;
      const marker = document.createElement('span');
      marker.textContent = '\u200b';
      m.appendChild(marker);
      m.appendChild(document.createTextNode(after));

      const taRect = ta.getBoundingClientRect();
      const mRect = m.getBoundingClientRect();
      const markerRect = marker.getBoundingClientRect();
      const lineHeight = parseFloat(cs.lineHeight) || parseFloat(cs.fontSize) * 1.5;

      fauxCaret.style.display = 'block';
      fauxCaret.style.left = (taRect.left + (markerRect.left - mRect.left) - ta.scrollLeft) + 'px';
      fauxCaret.style.top  = (taRect.top  + (markerRect.top  - mRect.top)  - ta.scrollTop)  + 'px';
      fauxCaret.style.height = lineHeight + 'px';

      // Restart blink so the caret is visible immediately after a move
      // (rather than possibly mid-blink-off).
      fauxCaret.style.animation = 'none';
      // eslint-disable-next-line no-unused-expressions
      fauxCaret.offsetHeight;
      fauxCaret.style.animation = '';
    }

    // Recompute on anything that can move the caret. Both panes are
    // editable post-§1.3, so the faux caret tracks whichever one has
    // focus (updateFauxCaret already keys off document.activeElement).
    ['input', 'click', 'keyup', 'focus', 'scroll', 'select'].forEach(evt => {
      pad.addEventListener(evt, updateFauxCaret);
      padOut.addEventListener(evt, updateFauxCaret);
    });
    function maybeHideFauxCaret() {
      // Defer so a focus change pad↔padOut doesn't briefly hide it.
      setTimeout(() => {
        if (!(document.activeElement instanceof HTMLTextAreaElement)) {
          fauxCaret.style.display = 'none';
        }
      }, 0);
    }
    pad.addEventListener('blur', maybeHideFauxCaret);
    padOut.addEventListener('blur', maybeHideFauxCaret);
    document.addEventListener('selectionchange', updateFauxCaret);
    window.addEventListener('resize', updateFauxCaret);

    // Track the focus font-size transition so the caret stays glued to
    // the cursor across the 80 ms 22→26 px ease.
    function trackTransition() {
      const start = performance.now();
      const tick = (now) => {
        updateFauxCaret();
        if (now - start < 140) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }
    pad.addEventListener('transitionrun', trackTransition);
    padOut.addEventListener('transitionrun', trackTransition);

    requestAnimationFrame(updateFauxCaret);
  </script>
</body>
</html>
